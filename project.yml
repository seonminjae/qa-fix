name: QAFixMac
options:
  bundleIdPrefix: com.fanmaum
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: false
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    ENABLE_APP_SANDBOX: YES
targets:
  QAFixMac:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: QAFixMac
        excludes:
          - "Resources/*.entitlements"
    resources:
      - path: QAFixMac/Resources/Assets.xcassets
      - path: QAFixMac/Resources/CRITICAL.md
      - path: QAFixMac/Resources/SECURITY.md
      - path: QAFixMac/Resources/UIKit-CRITICAL.md
    info:
      path: QAFixMac/Info.plist
      properties:
        CFBundleName: QAFixMac
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSMinimumSystemVersion: "14.0"
        NSHumanReadableCopyright: "Copyright (c) 2026 Fanmaum"
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fanmaum.QAFixMac
        CODE_SIGN_ENTITLEMENTS: QAFixMac/Resources/QAFixMac.entitlements
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_PREVIEWS: YES
        ENABLE_APP_SANDBOX: NO
  QAFixMacTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: QAFixMacTests
    resources:
      - path: QAFixMacTests/Fixtures
    dependencies:
      - target: QAFixMac
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fanmaum.QAFixMacTests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/QAFixMac.app/Contents/MacOS/QAFixMac"
  CLISpike:
    type: tool
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: CLISpike
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fanmaum.QAFixMac.CLISpike
        ENABLE_APP_SANDBOX: NO
